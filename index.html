<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nathaniel Ruprecht | Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes spin-color {
            0% { transform: rotate(0deg); color: #06b6d4; }   /* Cyan */
            25% { transform: rotate(90deg); color: #a855f7; }  /* Purple */
            50% { transform: rotate(180deg); color: #ec4899; }  /* Pink */
            75% { transform: rotate(270deg); color: #eab308; }  /* Yellow */
            100% { transform: rotate(360deg); color: #06b6d4; } /* Back to Cyan */
        }
        
        .animate-spin-color {
            animation: spin-color 2s linear infinite;
            display: inline-block;
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-200 h-screen flex flex-col items-center justify-center p-4">
    
    <div class="text-center">
        
        <div class="animate-spin-color text-5xl font-mono mb-6 font-bold">/</div>

        <h1 class="text-4xl md:text-5xl font-semibold tracking-tight mb-4">Nathaniel Ruprecht</h1>
        <p class="text-xl text-gray-400 uppercase tracking-widest font-medium">Work in Progress</p>
        
        <div class="mt-10 border-t border-gray-800 pt-6">
            <p class="text-sm text-gray-500">Homelab Projects & Resume coming soon.</p>
        </div>
    </div>

</body>
</html>
